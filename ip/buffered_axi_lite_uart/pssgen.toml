[project]
name = "buffered_axi_lite_uart"

[requirements]
source = "docs/BALU-RS-001.docx"
# pssgen import-reqs --from word reads this file
# to bootstrap buffered_axi_lite_uart.req
# The .req file is never overwritten once created.

[input]
vplan  = "buffered_axi_lite_uart_vplan.xlsx"
# legacy — superseded by vplan; retained for reference
# intent = "buffered_axi_lite_uart.intent"
# req    = "buffered_axi_lite_uart.req"

[output]
dir = "tb"
# pssgen writes generated testbench, PSS model,
# RAL model, gap report, and data sheet here.
# Re-running pssgen regenerates all files in this
# directory. Do not store hand-authored files here.

[[sources]]
hdl = "vhdl/buffered_axi_lite_uart.vhd"

[[register_maps]]
source = "buffered_axi_lite_uart_regmap.xlsx"
format = "simple_block"